name: AI Design Merged Gateway

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare implementation gate comment
        id: gate
        run: node scripts/handle-design-merged.mjs "$GITHUB_EVENT_PATH"

      - name: Comment on issue
        if: steps.gate.outputs.notify == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          COMMENT_BODY_FILE: ${{ steps.gate.outputs.comment_body_file }}
        run: gh issue comment "$ISSUE_NUMBER" --body-file "$COMMENT_BODY_FILE"
